title: ""
labels: []
assignees: []

sections:
  description:
    label: Description
    placeholder: |
      A clear and concise description of what this PR does and why it is needed.
      Closes # (issue number)

  type_of_change:
    label: Type of Change
    options:
      - "Bug fix (non-breaking change that fixes an issue)"
      - "New feature (non-breaking change that adds functionality)"
      - "Breaking change (fix or feature that would cause existing functionality to change)"
      - "Documentation update"
      - "Refactor / code cleanup"
      - "CI/CD or tooling change"

  changes_made:
    label: Changes Made
    placeholder: |
      - Change 1
      - Change 2
      - Change 3

  testing:
    label: How Has This Been Tested?
    description: Describe the tests you ran to verify your changes.
    options:
      - "Unit tests"
      - "Integration tests"
      - "Manual testing"
    test_command:
      placeholder: "pytest tests/"

  checklist:
    label: Checklist
    items:
      - "My code follows the project's style guidelines"
      - "I have performed a self-review of my own code"
      - "I have added tests that prove my fix/feature works"
      - "New and existing unit tests pass locally"
      - "I have updated documentation where necessary"
      - "My changes do not introduce new warnings or errors"
      - "Any dependent changes have been merged and published"

  screenshots:
    label: Screenshots (if applicable)
    placeholder: Add screenshots to illustrate any UI or response changes.

  additional_notes:
    label: Additional Notes
    placeholder: Any extra context, caveats, or follow-up work to be aware of.
